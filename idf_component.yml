# ===========================================================================
#  idf_component.yml  -  Espressif managed components for USB-host CI-V
#
#  Only needed for the [env:cardputer_adv_usbhost] build (CIV_ENABLE_USB_HOST).
#  These pull in the USB host CDC-ACM driver plus the vendor VCP drivers that
#  recognise CH34x / CP210x / FTDI USB->serial adapters. Version ranges are
#  permissive; pin them if a future release changes the VCP::open() API used
#  in civ_usbhost.cpp.
# ===========================================================================
dependencies:
  espressif/usb_host_cdc_acm: "^2.0.0"
  espressif/usb_host_vcp: "^1.0.0"
  espressif/usb_host_ch34x_vcp: "^2.0.0"
  espressif/usb_host_cp210x_vcp: "^2.0.0"
  espressif/usb_host_ftdi_vcp: "^2.0.0"
