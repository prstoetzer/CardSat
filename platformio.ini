; ============================================================================
;  CardSat - Satellite tracker + CI-V Doppler controller for M5Stack Cardputer ADV
; ============================================================================
;  Target: M5Stack Cardputer ADV  (StampS3A = ESP32-S3FN8, 8 MB flash, no PSRAM)
;
;  Build:   pio run
;  Flash:   pio run -t upload
;  Monitor: pio device monitor -b 115200
; ----------------------------------------------------------------------------

[env:cardputer_adv]
platform        = espressif32
board           = m5stack-stamps3
framework       = arduino
monitor_speed   = 115200
upload_speed    = 1500000

; The StampS3A has 8 MB flash. Use a partition table with a large app +
; a LittleFS data partition for cached TLEs / transponders / config.
board_build.partitions = default_8MB.csv
board_build.filesystem = littlefs

build_flags =
    -DCORE_DEBUG_LEVEL=2
    -DBOARD_HAS_PSRAM=0
    -DARDUINOJSON_USE_DOUBLE=1
    ; LoRa (SX1262) is a standard, always-built feature -- ship every feature:
    -DCARDSAT_HAS_LORA=1
    ; Cardputer libs:
    -DM5CARDPUTER
    ; ---- USB CAT (CAT_USB), ON by default (config.h, since 0.9.59) -----------
    ; Drives a radio through a USB<->serial adapter (FTDI/CP210x/CH34x) on the
    ; USB-C port instead of the G1/G2 UART. Needs the EspUsbHost entry under
    ; lib_deps below -- v2.3.1+ compiles clean against arduino-esp32 3.2.1 (the
    ; peripheral_map fix is upstream since 2.3.1; only <=2.3.0 copies need the
    ; one-line patch in docs/BUILD_AND_FLASH.md). To build WITHOUT USB CAT, add
    ; -DCARDSAT_HAS_USBCAT=0 here and comment the EspUsbHost lib_dep back out.
    ; ESP_USB_HOST_MAX_DEVICES must be a global define here (and ONLY here for
    ; PlatformIO -- it must reach EspUsbHost.cpp's own translation unit, or the
    ; layouts diverge and the firmware corrupts itself; see usbserial.cpp). The
    ; Arduino IDE path gets the same value from build_opt.h.
    -DESP_USB_HOST_MAX_DEVICES=4
    ;   (4: a hub is itself a device, and the USB rotator support that shipped
    ;    in 0.9.58 -- docs/interfaces/ROTATOR_TRANSPORTS.md -- means hub + radio
    ;    adapter + rotator adapter = 3 devices before any margin. The host
    ;    object is heap-allocated only while engaged, so the slots cost nothing
    ;    at rest.)

lib_deps =
    m5stack/M5Cardputer @ ^1.0.3        ; pulls in M5Unified + M5GFX
    bblanchon/ArduinoJson @ ^7.1.0
    mikalhart/TinyGPSPlus @ ^1.1.0
    jgromes/RadioLib @ ^7.1.0           ; SX1262 LoRa (CARDSAT_HAS_LORA=1, always built)
    ; SGP4 propagation + pass prediction for Arduino/ESP32. NOTE: this is the
    ; Vallado unified SGP4 -- it includes the DEEP-SPACE model (SDP4) and selects
    ; it automatically for orbits with a period >= 225 min, so QO-100 and any
    ; future amateur HEO propagate correctly with no work on CardSat's part.
    https://github.com/Hopperpop/Sgp4-Library.git
    ; USB CAT (CAT_USB) -- required by the default build (CARDSAT_HAS_USBCAT is
    ; on in config.h since 0.9.59; bench-proven on an IC-821 + FTDI in 0.9.58).
    ; ^2.3.1: the peripheral_map compile fix landed upstream in v2.3.1, so no
    ; library patch is needed (CardSat 0.9.59 compiles clean against pristine
    ; v2.3.2 + arduino-esp32 3.2.1 -- verified). Comment this out (and set
    ; -DCARDSAT_HAS_USBCAT=0 above) to build without USB CAT.
    tanakamasayuki/EspUsbHost @ ^2.3.1

; NOTE on the ADV: the StampS3A core is supported by M5Unified, but the ADV is a
; very recent variant. If the keyboard or display init misbehaves, update
; M5Cardputer/M5Unified to the latest git master:
;   lib_deps = https://github.com/m5stack/M5Cardputer.git
